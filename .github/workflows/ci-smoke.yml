name: CI Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Unit and Integration Tests
        run: npm test

      - name: End-to-End Smoke
        run: npm run smoke:e2e

      - name: Storage Health Gate
        run: npm run ci:storage-health

      - name: Storage Replay Benchmark Gate
        run: npm run ci:storage-benchmark

      - name: Upload Storage Status Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-status
          path: artifacts/storage-status.json
          if-no-files-found: warn

      - name: Upload Storage Benchmark Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-benchmark
          path: artifacts/storage-benchmark.json
          if-no-files-found: warn
